<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <h1>My List</h1>
    <h2>Unordered List</h2>
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
    </ul>
    <h2>Ordered List</h2>
    <ol type="i">
        <li>ONE</li>
        <li>TWO</li>
        <li>THREE</li>
        <li>FOUR</li>
    </ol>
    <dl>
        <dt>Hot Tea</dt>
        <dd>I love Hot Tea</dd>
    </dl>

    <P>Lorem ipsum dolor sit amet consectetur, <SPAN>Test</SPAN>adipisicing elit. Quia, fugiat.</P>
</body>
</html>
