<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table {
            width: 100%;
            text-align: center;
            border-collapse: collapse;
        }
        td, th{
            border: 1px solid black;
            padding: 10px;
        }
        tr:nth-child(odd){
            background-color: #414141;
        }
    </style>
</head>
<body>
        <table>
            <tr>
                <th colspan="2">Country</th>
                <th >Country Code</th>
                <th>Country Email</th>
            </tr>
            <tr>
                <td>Bangladesh</td>
                <td>BD</td>
                <td>Bangladesh@gmail.com</td>
            </tr>
            <tr>
                <td>India</td>
                <td>IN</td>
                <td>India@gmail.com</td>
            </tr>
            <tr>
                <td>Australia</td>
                <td>AUS</td>
                <td>Ausi@gmail.com</td>
            </tr>
            <tr>
                <td>United Kingdom</td>
                <td>UK</td>
                <td>UK@gmail.com</td>
            </tr>
        </table>
</body>
</html>
